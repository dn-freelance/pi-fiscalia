<div
    class="modal-overlay"
    id="div-tag-create-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="heading-tag-create-modal"
    hidden
>
    <div class="modal-box" tabindex="-1">
        <div class="modal-header">
            <h2 id="heading-tag-create-modal">Nova Tag</h2>
            <button type="button" class="close-btn" aria-label="Fechar modal" data-modal-close="div-tag-create-modal">&times;</button>
        </div>

        <form id="form-tag-create" method="post" action="{% url 'feeds:create_tag' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="input-tag-create-name">Nome da Tag</label>
                <input id="input-tag-create-name" name="name" type="text" placeholder="Ex: ICMS, NCM, Simples Nacional" required pattern="^[A-Za-zÃ€-Ã¿0-9\s\-/&()]+$" title="Use letras, numeros, espacos e os simbolos / - &amp; ()">
            </div>

            <fieldset class="form-group form-fieldset">
                <legend id="legend-tag-create-color">Cor</legend>
                <div class="tag-color-picker" data-color-field="input-tag-create-color" role="radiogroup" aria-labelledby="legend-tag-create-color">
                    {% for key, label in tag_color_choices %}
                        <button
                            type="button"
                            class="tag-color-button tag-color-button-{{ key }}{% if forloop.first %} is-selected{% endif %}"
                            data-color="{{ key }}"
                            role="radio"
                            aria-checked="{% if forloop.first %}true{% else %}false{% endif %}"
                            tabindex="{% if forloop.first %}0{% else %}-1{% endif %}"
                        >
                            {{ label }}
                        </button>
                    {% endfor %}
                </div>
                <input id="input-tag-create-color" name="color" type="hidden" value="{{ tag_color_choices.0.0 }}">
            </fieldset>

            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-modal-close="div-tag-create-modal">Cancelar</button>
                <button type="submit" class="btn btn-success">Criar</button>
            </div>
        </form>
    </div>
</div>
