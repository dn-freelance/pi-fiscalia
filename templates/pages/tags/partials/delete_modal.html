<div
    class="modal-overlay"
    id="div-tag-delete-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="heading-tag-delete-modal"
    aria-describedby="paragraph-tag-delete-modal"
    hidden
>
    <div class="modal-box modal-box-sm" tabindex="-1">
        <div class="modal-header">
            <h2 id="heading-tag-delete-modal">Confirmar exclusão</h2>
            <button type="button" class="close-btn" aria-label="Fechar modal" data-modal-close="div-tag-delete-modal">&times;</button>
        </div>

        <p class="modal-description" id="paragraph-tag-delete-modal">Tem certeza que deseja remover esta tag? Esta ação não pode ser desfeita.</p>

        <form id="form-tag-delete" method="post" action="">
            {% csrf_token %}
            <input type="hidden" name="name" value="">

            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-modal-close="div-tag-delete-modal">Cancelar</button>
                <button type="submit" class="btn btn-danger">Excluir</button>
            </div>
        </form>
    </div>
</div>
