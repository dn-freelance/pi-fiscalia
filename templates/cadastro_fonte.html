{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Fonte RSS</title>
    <!-- O seu arquivo CSS global único -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <div class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Nova Fonte RSS</h2>
                <button class="close-btn">&times;</button>
            </div>

            <form>
                <div class="form-group">
                    <label>Nome da Fonte</label>
                    <input type="text" placeholder="Ex: Receita Federal do Brasil">
                </div>

                <div class="form-group">
                    <label>URL do Feed RSS</label>
                    <input type="url" placeholder="https://exemplo.com/rss">
                </div>

                <div class="form-group">
                    <label>Descrição</label>
                    <textarea placeholder="Breve descrição do conteúdo"></textarea>
                </div>

                <div class="form-group">
                    <label>Categoria</label>
                    <select>
                        <option value="federal">Federal</option>
                        <option value="estadual">Estadual</option>
                        <option value="municipal">Municipal</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-light">Cancelar</button>
                    <button type="submit" class="btn btn-success">Adicionar Fonte</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
