<div class="modal-overlay" id="div-source-delete-modal" style="display: none;">
  <div class="modal-box modal-box-sm">
    <div class="modal-header">
      <h2>Confirmar exclusão</h2>
    </div>

    <p class="modal-description">Tem certeza que deseja remover esta fonte? Esta ação não pode ser desfeita.</p>

    <form id="form-source-delete" method="post" action="">
      {% csrf_token %}
      <input type="hidden" name="name" value="">

      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-source-modal-close="div-source-delete-modal">Cancelar</button>
        <button type="submit" class="btn btn-danger">Excluir</button>
      </div>
    </form>
  </div>
</div>
